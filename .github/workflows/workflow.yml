name: CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-puthon@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: 
          pip install flake8 pytest

      - name: Lint code
        run: flake8

      - name: Run tests
        run: pytest
